apiVersion: apps/v1
kind: Deployment
metadata:
  name: items-kube
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: items-kube
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: items-kube
    spec:
      serviceAccountName: items-kube-sa
      containers:
        - name: items-kube
          image: 668523141360.dkr.ecr.ap-south-1.amazonaws.com/items_kube:v1
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: items-kube-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10